# ===============================
# 🔧 BIZCORE CONFIG V16 PRO
# ===============================

settings:
  max-members: 10
  max-name-length: 12
  allow-color-names: false

# ===============================
# 💰 ECONOMY
# ===============================
economy:
  start-balance: 0
  kill-reward: 500
  passive-income: 100
  passive-interval-seconds: 300

# ===============================
# ⭐ XP SYSTEM
# ===============================
xp:
  kill-xp: 50
  passive-xp: 10

levels:
  1:
    xp: 100
    reward-money: 500
  2:
    xp: 250
    reward-money: 1000
  3:
    xp: 500
    reward-money: 2000
  4:
    xp: 1000
    reward-money: 5000
  5:
    xp: 2000
    reward-money: 10000

# ===============================
# 🚀 UPGRADES
# ===============================
upgrades:
  multiplier:
    price: 1000
    increase: 0.5
    max-level: 5

  storage:
    price: 2000
    increase: 10
    max-level: 3

# ===============================
# 🖥️ GUI
# ===============================
gui:
  title: "§6BizCore"
  size: 27

  items:
    create:
      material: EMERALD
      name: "§aZaložit firmu"

    info:
      material: PAPER
      name: "§e{firma}"
      lore:
        - "§7Balance: §a{balance}"
        - "§7Level: §b{level}"
        - "§7XP: §e{xp}"

    members:
      material: CHEST
      name: "§6Členové"

    shop:
      material: EMERALD
      name: "§aUpgrade Shop"

# ===============================
# 📩 INVITE SYSTEM
# ===============================
invite:
  expire-seconds: 60
  max-pending: 5

# ===============================
# 🏆 BONUSY ZA LEVEL
# ===============================
bonuses:
  money-multiplier-per-level: 0.1
  xp-multiplier-per-level: 0.05

# ===============================
# 💬 MESSAGES
# ===============================
messages:
  no-firma: "§cNevlastníš firmu!"
  created: "§aFirma vytvořena!"
  invite-sent: "§aPozvánka odeslána!"
  invite-received: "§eByl jsi pozván do firmy §6{firma}"
  joined: "§aPřipojil ses do firmy §6{firma}"
  kicked: "§cByl jsi vyhozen z firmy"
  full: "§cFirma je plná!"
  no-permission: "§cNa to nemáš práva!"
